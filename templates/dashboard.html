<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨境电商情报仪表板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2em;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }

        .header-actions { display: flex; gap: 12px; }

        .collection-status {
            font-size: 12px;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #555;
        }
        .status-dot.running { background: #00d4ff; animation: pulse 1s infinite; }
        .status-dot.done { background: #22c55e; }
        .status-dot.error { background: #ef4444; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,212,255,0.4); }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-card h3 { color: #aaa; font-size: 13px; margin-bottom: 10px; }

        .stat-card .value {
            font-size: 2.2em;
            font-weight: 700;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card .value.small { font-size: 1em; -webkit-text-fill-color: #fff; }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .chart-card h3 { margin-bottom: 15px; }

        .content-section {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .filters { display: flex; gap: 12px; flex-wrap: wrap; }

        select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 13px;
        }

        .content-list { max-height: 600px; overflow-y: auto; }

        .content-item {
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            border-left: 4px solid #555;
            transition: all 0.2s;
        }

        .content-item:hover { background: rgba(255,255,255,0.1); transform: translateX(4px); }
        .content-item.douyin { border-color: #fe2c55; }
        .content-item.reddit { border-color: #ff4500; }
        .content-item.tiktok { border-color: #00f2ea; }
        .content-item.xiaohongshu { border-color: #ff2442; }
        .content-item.x { border-color: #1da1f2; }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
        }

        .content-title {
            font-size: 15px;
            font-weight: 600;
            color: #e0e0e0;
            text-decoration: none;
            flex: 1;
            line-height: 1.4;
        }
        .content-title:hover { color: #00d4ff; }

        .badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            background: rgba(255,255,255,0.15);
            color: #ccc;
        }

        .content-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .content-stats { display: flex; gap: 16px; flex-wrap: wrap; }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #aaa;
        }

        .loading { text-align: center; padding: 50px; color: #aaa; }
        .empty-state { text-align: center; padding: 50px; color: #aaa; }

        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            header { flex-direction: column; gap: 15px; }
            .header-right { align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🌐 跨境电商情报仪表板</h1>
        <div class="header-right">
            <div class="header-actions">
                <button class="btn-primary" onclick="loadData()">🔄 刷新</button>
                <button class="btn-secondary" id="collect-btn" onclick="triggerCollection()">🚀 立即收集</button>
            </div>
            <div class="collection-status">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">-</span>
            </div>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>总数据量</h3>
            <div class="value" id="total-items">-</div>
        </div>
        <div class="stat-card">
            <h3>视频内容</h3>
            <div class="value" id="video-count">-</div>
        </div>
        <div class="stat-card">
            <h3>平台数</h3>
            <div class="value" id="platform-count">-</div>
        </div>
        <div class="stat-card">
            <h3>最后更新</h3>
            <div class="value small" id="last-update">-</div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-card">
            <h3>📊 平台分布</h3>
            <canvas id="platformChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>🔍 关键词热度</h3>
            <canvas id="keywordChart"></canvas>
        </div>
    </div>

    <div class="content-section">
        <div class="section-header">
            <h3>🔥 内容列表</h3>
            <div class="filters">
                <select id="platform-filter" onchange="filterContent()">
                    <option value="">所有平台</option>
                    <option value="douyin">抖音</option>
                    <option value="reddit">Reddit</option>
                    <option value="tiktok">TikTok</option>
                    <option value="xiaohongshu">小红书</option>
                    <option value="x">X.com</option>
                </select>
                <select id="keyword-filter" onchange="filterContent()">
                    <option value="">所有关键词</option>
                </select>
            </div>
        </div>
        <div class="content-list" id="content-list">
            <div class="loading">加载中...</div>
        </div>
    </div>
</div>

<script>
    let allData = [];
    let platformChart, keywordChart;
    let statusTimer = null;

    const platformNames = {
        douyin: '抖音', reddit: 'Reddit', tiktok: 'TikTok',
        xiaohongshu: '小红书', x: 'X.com'
    };

    const platformColors = {
        douyin: '#fe2c55', reddit: '#ff4500', tiktok: '#00f2ea',
        xiaohongshu: '#ff2442', x: '#1da1f2'
    };

    async function loadData() {
        try {
            const [statsRes, dataRes] = await Promise.all([
                fetch('/api/stats'),
                fetch('/api/data')
            ]);
            const stats = await statsRes.json();
            const dataResult = await dataRes.json();

            // 统计卡片
            document.getElementById('total-items').textContent = stats.total_items || 0;
            document.getElementById('video-count').textContent = stats.video_count || 0;
            document.getElementById('platform-count').textContent = Object.keys(stats.by_platform || {}).length;

            if (dataResult.updated) {
                document.getElementById('last-update').textContent =
                    new Date(dataResult.updated).toLocaleString('zh-CN');
            }

            // 图表
            if (stats.by_platform) updatePlatformChart(stats.by_platform);
            if (stats.by_keyword) {
                updateKeywordChart(stats.by_keyword);
                updateKeywordFilter(Object.keys(stats.by_keyword));
            }

            // 内容列表
            allData = dataResult.data || [];
            filterContent();

            // 收集状态
            updateStatusUI(stats.collection_status);
        } catch (e) {
            document.getElementById('content-list').innerHTML =
                '<div class="empty-state">加载失败，请检查服务是否运行</div>';
        }
    }

    function updateStatusUI(status) {
        if (!status) return;
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        const btn = document.getElementById('collect-btn');

        if (status.running) {
            dot.className = 'status-dot running';
            text.textContent = '收集中...';
            btn.disabled = true;
            btn.textContent = '⏳ 收集中';
        } else if (status.error) {
            dot.className = 'status-dot error';
            text.textContent = '上次收集失败';
            btn.disabled = false;
            btn.textContent = '🚀 立即收集';
        } else if (status.last_run) {
            dot.className = 'status-dot done';
            text.textContent = `上次收集: ${new Date(status.last_run).toLocaleTimeString('zh-CN')}，共 ${status.last_count} 条`;
            btn.disabled = false;
            btn.textContent = '🚀 立即收集';
        } else {
            dot.className = 'status-dot';
            text.textContent = '等待首次收集';
            btn.disabled = false;
        }
    }

    async function pollStatus() {
        try {
            const res = await fetch('/api/status');
            const status = await res.json();
            updateStatusUI(status);
            if (!status.running) {
                clearInterval(statusTimer);
                statusTimer = null;
                await loadData(); // 收集完成后刷新数据
            }
        } catch (e) {}
    }

    async function triggerCollection() {
        const res = await fetch('/api/trigger');
        const result = await res.json();
        if (result.status === 'started' || result.status === 'already_running') {
            document.getElementById('collect-btn').disabled = true;
            document.getElementById('collect-btn').textContent = '⏳ 收集中';
            document.getElementById('status-dot').className = 'status-dot running';
            document.getElementById('status-text').textContent = '收集中...';
            // 每 3 秒轮询状态
            if (!statusTimer) {
                statusTimer = setInterval(pollStatus, 3000);
            }
        }
    }

    function updatePlatformChart(data) {
        const ctx = document.getElementById('platformChart').getContext('2d');
        const labels = Object.keys(data).map(k => platformNames[k] || k);
        const values = Object.values(data);
        const colors = Object.keys(data).map(k => platformColors[k] || '#888');

        if (platformChart) platformChart.destroy();
        platformChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels, datasets: [{ data: values, backgroundColor: colors }] },
            options: {
                responsive: true,
                plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } }
            }
        });
    }

    function updateKeywordChart(data) {
        const ctx = document.getElementById('keywordChart').getContext('2d');
        const sorted = Object.entries(data).sort((a, b) => b[1] - a[1]).slice(0, 10);

        if (keywordChart) keywordChart.destroy();
        keywordChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: sorted.map(d => d[0]),
                datasets: [{
                    data: sorted.map(d => d[1]),
                    backgroundColor: 'rgba(0,212,255,0.7)',
                    borderColor: '#00d4ff',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, ticks: { color: '#fff' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                    x: { ticks: { color: '#fff', maxRotation: 45 }, grid: { display: false } }
                }
            }
        });
    }

    function updateKeywordFilter(keywords) {
        const select = document.getElementById('keyword-filter');
        select.innerHTML = '<option value="">所有关键词</option>';
        keywords.forEach(k => {
            select.innerHTML += `<option value="${k}">${k}</option>`;
        });
    }

    function filterContent() {
        const pf = document.getElementById('platform-filter').value;
        const kf = document.getElementById('keyword-filter').value;

        let filtered = allData
            .filter(item => !pf || item.platform === pf)
            .filter(item => !kf || item.keyword === kf)
            .sort((a, b) => (b.likes || b.upvotes || 0) - (a.likes || a.upvotes || 0));

        renderContent(filtered);
    }

    function renderContent(items) {
        const container = document.getElementById('content-list');
        if (!items.length) {
            container.innerHTML = '<div class="empty-state">暂无数据</div>';
            return;
        }

        container.innerHTML = items.slice(0, 50).map(item => {
            const title = item.title || item.content?.substring(0, 100) || '无标题';
            const coverHtml = item.cover
                ? `<a href="${item.url || '#'}" target="_blank" rel="noopener">
                     <img src="${item.cover}" alt="封面" style="width:120px;height:68px;object-fit:cover;border-radius:6px;flex-shrink:0;display:block;">
                   </a>`
                : '';
            return `
            <div class="content-item ${item.platform}">
                <div style="display:flex;gap:12px;align-items:flex-start;">
                    ${coverHtml}
                    <div style="flex:1;min-width:0;">
                        <div class="content-header">
                            <a href="${item.url || '#'}" target="_blank" rel="noopener" class="content-title">${escapeHtml(title)}</a>
                            <span class="badge">${platformNames[item.platform] || item.platform}</span>
                        </div>
                        <div class="content-meta">
                            <span>👤 ${escapeHtml(item.author || '匿名')}</span>
                            <span>🔑 ${escapeHtml(item.keyword || '')}</span>
                            ${item.created_at ? `<span>📅 ${new Date(item.created_at).toLocaleDateString('zh-CN')}</span>` : ''}
                            ${item.is_video ? '<span>🎬 视频</span>' : ''}
                        </div>
                        <div class="content-stats">
                            ${item.likes != null ? `<span class="stat-item">❤️ ${fmt(item.likes)}</span>` : ''}
                            ${item.upvotes != null ? `<span class="stat-item">⬆️ ${fmt(item.upvotes)}</span>` : ''}
                            ${item.comments != null ? `<span class="stat-item">💬 ${fmt(item.comments)}</span>` : ''}
                            ${item.retweets != null ? `<span class="stat-item">🔁 ${fmt(item.retweets)}</span>` : ''}
                            ${item.shares != null ? `<span class="stat-item">📤 ${fmt(item.shares)}</span>` : ''}
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function fmt(n) {
        if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
        if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
        return n;
    }

    function escapeHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
